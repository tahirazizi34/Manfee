name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install CocoaPods
        run: |
          cd src
          pod install
          
      - name: Build IPA
        run: |
          cd src
          xcodebuild -workspace T-Teka.xcworkspace \
            -scheme T-Teka \
            -configuration Release \
            -archivePath build/T-Teka.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: T-Teka-build
          path: src/build/
